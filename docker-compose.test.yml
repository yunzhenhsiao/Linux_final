version: "3.9"

services:
  postgres:
    container_name: transitflow_postgres_test
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-transitflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2gb

  neo4j:
    container_name: transitflow_neo4j_test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-transitflow}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2gb

  redis:
    container_name: transitflow_redis_test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512mb

  # Testing requires local LLM setup
  ollama:
    container_name: transitflow_ollama_test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4gb

  ui:
    container_name: transitflow_ui_test
    ports:
      - "7860:7860"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "skeleton/health_check.py"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1gb

  celery:
    container_name: transitflow_celery_test
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1gb

  celery-beat:
    container_name: transitflow_celery_beat_test
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512mb

  init-db:
    container_name: transitflow_init_db_test
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
