version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: transitflow_postgres
    environment:
      POSTGRES_USER: ${PG_USER:-transitflow}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-transitflow}
      POSTGRES_DB: ${PG_DB:-transitflow}
    volumes:
      - postgres_data_v2a:/var/lib/postgresql/data
      - ./databases/relational/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - transitflow_net

  neo4j:
    image: neo4j:5-community
    container_name: transitflow_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-transitflow}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data_v2a:/data
    networks:
      - transitflow_net

  redis:
    image: redis:7-alpine
    container_name: transitflow_redis
    volumes:
      - redis_data_v2a:/data
    command: redis-server --appendonly yes
    networks:
      - transitflow_net

  ollama:
    image: ollama/ollama:latest
    container_name: transitflow_ollama
    volumes:
      - ollama_data_v2a:/root/.ollama
    networks:
      - transitflow_net

  ui:
    build:
      context: .
      dockerfile: skeleton/Dockerfile
    container_name: transitflow_ui
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-transitflow}
      PG_PASSWORD: ${PG_PASSWORD:-transitflow}
      PG_DB: ${PG_DB:-transitflow}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-transitflow}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-yes}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - transitflow_net

  celery:
    build:
      context: .
      dockerfile: skeleton/Dockerfile
    container_name: transitflow_celery
    command: celery -A skeleton.tasks worker --loglevel=${LOG_LEVEL:-info}
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-transitflow}
      PG_PASSWORD: ${PG_PASSWORD:-transitflow}
      PG_DB: ${PG_DB:-transitflow}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-transitflow}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - transitflow_net

  celery-beat:
    build:
      context: .
      dockerfile: skeleton/Dockerfile
    container_name: transitflow_celery_beat
    command: celery -A skeleton.tasks beat --loglevel=${LOG_LEVEL:-info}
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-transitflow}
      PG_PASSWORD: ${PG_PASSWORD:-transitflow}
      PG_DB: ${PG_DB:-transitflow}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-transitflow}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - transitflow_net

  init-db:
    build:
      context: .
      dockerfile: skeleton/Dockerfile
    container_name: transitflow_init_db
    command: python scripts/init_db.py
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-transitflow}
      PG_PASSWORD: ${PG_PASSWORD:-transitflow}
      PG_DB: ${PG_DB:-transitflow}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-transitflow}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-yes}
    networks:
      - transitflow_net

networks:
  transitflow_net:
    driver: bridge

volumes:
  postgres_data_v2a:
  neo4j_data_v2a:
  redis_data_v2a:
  ollama_data_v2a:
